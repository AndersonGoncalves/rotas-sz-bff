services:
  api:
    build: .          # usa o Dockerfile que você criou no Passo 1
    ports:
      - "3001:3001"   # expõe a porta 3001 para fora do container
    env_file:
      - .env
    environment:
      SERVER_PORT: 3001
      AWS_BUCKET_NAME: api-node-storage-anderson-goncalves
      AWS_REGION: us-east-1
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7    # baixa a imagem oficial do MongoDB
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db   # salva os dados fora do container
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "-u", "${MONGO_USER}", "-p", "${MONGO_PASSWORD}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:   # volume nomeado: dados persistem mesmo se o container for recriado